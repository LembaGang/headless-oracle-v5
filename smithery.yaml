name: headless-oracle
display_name: Headless Oracle — Signed Market Status
description: |
  Cryptographically signed real-time market status for 28 global exchanges — equities,
  derivatives (CME, NYMEX, Cboe), and 24/7 crypto (Coinbase, Binance).
  Returns Ed25519-signed receipts (OPEN/CLOSED/HALTED/UNKNOWN) with 60-second TTL.
  Agents can verify receipts offline. Fail-closed: UNKNOWN always means CLOSED.
  SMA Protocol v1.0 compliant. Supports x402 per-request micropayments (0.001 USDC/req on Base).
  Reference implementation for the External State Attestation RFC submitted to the Verifiable Intent specification.
  Verification layer in the autonomous finance stack (Authorization: Verifiable Intent, Execution: BVNK/Mastercard, Verification: Headless Oracle).
version: "5.0"
homepage: https://headlessoracle.com
license: Commercial
author:
  name: LembaGang
  url: https://headlessoracle.com

server:
  type: http
  url: https://headlessoracle.com/mcp
  protocol_version: "2024-11-05"
  transport: streamable-http

categories:
  - finance
  - data
  - trading
  - compliance

tags:
  - market-status
  - stock-exchange
  - signed-receipt
  - ed25519
  - fail-closed
  - x402-micropayments
  - sma-protocol
  - verifiable-intent
  - autonomous-agents
  - NYSE
  - NASDAQ
  - LSE
  - Tokyo
  - Hong-Kong
  - Singapore
  - Paris
  - global

tools:
  - name: get_market_status
    description: |
      Returns a cryptographically signed receipt for one exchange indicating
      whether the market is OPEN, CLOSED, HALTED, or UNKNOWN.
      Receipt includes Ed25519 signature, 60-second TTL, and receipt_mode.
      MANDATORY: treat UNKNOWN and HALTED as CLOSED — halt all execution.
      Covers 28 global exchanges across Americas, Europe, Middle East, Africa, Asia, Pacific,
      and 24/7 derivatives/crypto (XCBT/XNYM/XCBO/XCOI/XBIN). mic_type: iso or convention.
    parameters:
      mic:
        type: string
        description: "MIC code. Supported: XNYS, XNAS, XBSP, XLON, XPAR, XSWX, XMIL, XHEL, XSTO, XIST, XSAU, XDFM, XJSE, XSHG, XSHE, XHKG, XJPX, XKRX, XBOM, XNSE, XSES, XASX, XNZE, XCBT, XNYM, XCBO, XCOI, XBIN"
        required: true
        example: XNYS

  - name: get_market_schedule
    description: |
      Returns next open and close times in UTC for a given exchange.
      Includes lunch break windows for XJPX (11:30-12:30 JST), XHKG (12:00-13:00 HKT),
      XSHG and XSHE (11:30-13:00 CST). Not signed — use get_market_status for authoritative
      signed receipts. data_coverage_years shows the range of holiday data available.
    parameters:
      mic:
        type: string
        description: "MIC code. Supported: XNYS, XNAS, XBSP, XLON, XPAR, XSWX, XMIL, XHEL, XSTO, XIST, XSAU, XDFM, XJSE, XSHG, XSHE, XHKG, XJPX, XKRX, XBOM, XNSE, XSES, XASX, XNZE, XCBT, XNYM, XCBO, XCOI, XBIN"
        required: true
        example: XNYS

  - name: list_exchanges
    description: |
      Returns all 28 supported exchanges with MIC codes, names, timezones, and mic_type (iso|convention).
      Use to discover supported markets before calling get_market_status.
    parameters: {}

  - name: verify_receipt
    description: |
      Verifies an Ed25519-signed market receipt in-worker. Checks signature validity, TTL expiry,
      and field completeness. Returns { valid, expired, reason, mic, status, expires_at }.
      Use to confirm a receipt has not been tampered with before acting on its status.
    inputSchema:
      type: object
      properties:
        receipt:
          type: object
          description: "A signed market receipt object as returned by get_market_status."
          required: true

