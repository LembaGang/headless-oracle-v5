name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Vitest (Cloudflare Workers)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .dev.vars (test-only keypair — not production keys)
        run: |
          cat > .dev.vars << 'EOF'
          ED25519_PRIVATE_KEY=ae0bbb58025719e317bc2eb6e0a31d59f8cd61bcbf011132750a61a1ecd1b872
          ED25519_PUBLIC_KEY=f8af78f563e8aa698b35b0b2511cd430a8c4aa6f7960534bb2b7e22d9b4a3fb8
          MASTER_API_KEY=test_master_key_local_only
          BETA_API_KEYS=test_beta_key_1,test_beta_key_2
          EOF

      - name: Run tests
        run: npx vitest run

      - name: Report
        if: always()
        run: echo "Test run complete"
