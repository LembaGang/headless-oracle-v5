[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "headless-oracle-sdk"
version = "0.1.0"
description = "Python SDK for Headless Oracle — Ed25519-signed market-state attestations for 28 global exchanges"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "LembaGang"}]
keywords = ["headless-oracle", "market-state", "ed25519", "mcp", "x402", "trading", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "pynacl>=1.5.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "respx>=0.21"]

[project.urls]
Homepage = "https://headlessoracle.com"
Repository = "https://github.com/LembaGang/headless-oracle-v5"
Documentation = "https://headlessoracle.com/docs"

[tool.setuptools.packages.find]
include = ["headless_oracle*"]
