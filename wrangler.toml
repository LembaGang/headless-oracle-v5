name = "headless-oracle-v5"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Embed docs/integrations/*.md as Text modules so we can import them directly.
rules = [
  { type = "Text", globs = ["**/*.md"], fallthrough = true }
]

# ─── Route Strategy ───────────────────────────────────────────────────────────
# Worker handles ONLY API routes. HTML pages (/, /pricing, /docs, /blog,
# /status, /verify, /traction, /refund, /upgrade) are served by Cloudflare
# Pages (headless-oracle-web). Do NOT add HTML page routes here.
routes = [
  { pattern = "api.headlessoracle.com/*", zone_name = "headlessoracle.com" },
  { pattern = "www.headlessoracle.com/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/v5/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/mcp", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/webhooks/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/.well-known/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/openapi.json", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/mics.json", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/oauth/token", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/oauth/introspect", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/sitemap.xml", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/robots.txt", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/llms.txt", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/llms-full.txt", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/SKILL.md", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/skill.md", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/AGENTS.md", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/agent-directory.json", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/badge/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/x402", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/docs/specifications/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/v1/verification/*", zone_name = "headlessoracle.com" },
  # /v1 patterns use a trailing `*` so the Cloudflare zone route table matches
  # the query-stringed form too (e.g. `?date=…`, `?limit=…`, `?venue=…`).
  # Without the wildcard, exact-path patterns match ONLY the bare URL — any
  # query string makes the request fall through to the Pages SPA fallback.
  # The in-worker `url.pathname === '/v1/<route>'` guards reject unintended
  # over-matches (`/v1/halts-foo`) cleanly via the 404 fallback.
  { pattern = "headlessoracle.com/v1/halts*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/v1/status", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/v1/status/*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/v1/safe-to-trade*", zone_name = "headlessoracle.com" },
  # /v1/safe-to-trade/sample is already covered by the trailing-wildcard above,
  # but we register the explicit sibling so the route table self-documents the
  # public-discovery door and stays correct if the parent wildcard is ever
  # tightened. We've been bitten twice on this class of bug — explicit > clever.
  { pattern = "headlessoracle.com/v1/safe-to-trade/sample*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/docs/integrations/ampersend*", zone_name = "headlessoracle.com" },
  { pattern = "headlessoracle.com/docs/integrations/*", zone_name = "headlessoracle.com" },
]

[vars]
PUBLIC_KEY_ID = "key_2026_v1"
CURRENT_TERMS_VERSION = "v5.0-2026"
# Launch date for /v5/traction days_live counter. Update if the worker is re-launched.
LAUNCH_DATE = "2026-03-10T08:00:00Z"
# Auto-updated by scripts/sync-test-count.sh after test runs.
TEST_COUNT = "1200"
# Nasdaq Trader RSS is the CONSOLIDATED US halt feed: it carries NASDAQ-,
# NYSE-, NYSE American-, NYSE Arca-listed halts, distinguished by the
# <ndaq:Market> element on each <item>. Free, no auth, no API key.
# Polling cadence is fixed at the existing 1/min cron — Nasdaq's published
# guidance is "Data is updated each trading day once a minute. Please do not
# query the data more than once a minute." DO NOT poll faster.
NASDAQ_HALTS_URL = "https://www.nasdaqtrader.com/rss.aspx?feed=tradehalts"
# NYSE_HALTS_URL — INTENTIONALLY UNSET. The real NYSE endpoint is CSV at
# /api/trade-halts/current/download, behind Akamai bot protection that rejects
# server-side fetches from datacenter IPs (returns a "supported browsers"
# challenge page, not data). The Nasdaq consolidated feed above already
# includes NYSE-listed halts, so a direct NYSE fetch is redundant. Capture
# loop skips silently when this slot is unset (no fetch, no gap row).
# A future direct NYSE source would require a browser / residential-proxy
# path; the env var is preserved for that future configuration.

# ─── KV Namespace: Manual Overrides ──────────────────────────────────────────
# Used for circuit breaker halts and emergency market status overrides.
# To create: Cloudflare Dashboard → Workers & Pages → KV → Create namespace
# Name it: ORACLE_OVERRIDES
# Then paste the namespace ID below and redeploy.
#
# To set an override (e.g. during a circuit breaker):
#   Key:   XNYS
#   Value: {"status":"HALTED","reason":"NYSE circuit breaker L1 triggered","expires":"2026-03-09T20:00:00Z"}
# To clear: delete the key. The Worker reverts to schedule-based status.
[[kv_namespaces]]
binding = "ORACLE_OVERRIDES"
id = "1c741530d611473687d2fad61f5b2e9c"

# ─── KV Namespace: Paid API Key Cache ────────────────────────────────────────
# 5-minute cache in front of Supabase for paid key auth.
# Key: sha256(raw_api_key_value) — Value: { "plan": "pro", "status": "active" }
# To create: Cloudflare Dashboard → Workers & Pages → KV → Create namespace
# Name it: ORACLE_API_KEYS — then paste the namespace ID below and redeploy.
[[kv_namespaces]]
binding = "ORACLE_API_KEYS"
id = "aaf52e9a579242f48fc09bb3e8afb293"

# ─── KV Namespace: MCP Client Telemetry ──────────────────────────────────────
# Stores daily MCP client aggregates for anonymous usage analytics.
# Key pattern: mcp_clients:{YYYY-MM-DD}:{sha256(client-ip)}
# Distinct from ORACLE_OVERRIDES — no market-safety data here.
[[kv_namespaces]]
binding = "ORACLE_TELEMETRY"
id = "6fcde4c94b6b40f1913a44f410a06c5d"

# ─── D1 Database: Signed Halt Archive ────────────────────────────────────────
# Append-only D1 database holding signed halt events from NYSE / Nasdaq feeds
# plus HO's own 28-MIC session-state transitions. Every row is Ed25519-signed
# with claim-ceiling framing ("observed source S reported X at T" — never
# "X was true at T"). See migrations/0001_halt_archive.sql for the schema.
#
# HUMAN TASK (before first prod deploy):
#   1. wrangler d1 create halt_archive
#   2. Replace the placeholder database_id below with the real ID returned.
#   3. wrangler d1 migrations apply halt_archive --remote
# Tests use Miniflare's in-memory D1 — placeholder ID is fine for tests.
[[d1_databases]]
binding       = "HALT_ARCHIVE"
database_name = "halt_archive"
database_id   = "dac1ff26-8774-43e5-a55f-7fac2c708743"
migrations_dir = "migrations"

# ─── R2 Bucket: Halt Archive Raw Payloads ────────────────────────────────────
# Raw bytes of external halt feeds, anchored by sha256 in the corresponding
# signed D1 row. Enables independent re-verification of what each source
# actually said at a given timestamp.
#
# HUMAN TASK (before first prod deploy):
#   wrangler r2 bucket create halt-archive-raw
[[r2_buckets]]
binding     = "HALT_ARCHIVE_RAW"
bucket_name = "halt-archive-raw"

# ─── Rate Limiting ────────────────────────────────────────────────────────────
# Rate limiting for public routes is configured in the Cloudflare Dashboard,
# NOT in this file. See OPERATOR_RUNBOOK.md → Section 5 for setup instructions.
# Dashboard path: Workers & Pages → headless-oracle-v5 → Settings → Rate Limiting
#
# Rules to add before HN launch (all: per IP, action: Block → 429):
#   Path                 Limit         Notes
#   /v5/demo*            100 req/min   Public demo endpoint
#   /v5/schedule*        60 req/min    Schedule queries
#   /v5/exchanges        60 req/min    Exchange directory
#   /v5/keys             60 req/min    Public key registry
#   /v5/checkout         10 req/min    Hits Paddle API — keep low
#   /v5/health           60 req/min    Liveness probe
#   /v1/status/*         60 req/min    Free signed status — unauth wedge
#   /v1/safe-to-trade/sample* 60 req/min  Free signed safe-to-trade — public door
#   /mcp                 60 req/min    MCP endpoint (agents)
#   /openapi.json        60 req/min    API spec discovery
#   /.well-known/*       60 req/min    Key/agent discovery
#   /llms.txt            60 req/min    LLM crawler
#
# Do NOT add rules for:
#   /v5/status   — protected by API key auth (401/403 on missing/invalid key)
#   /v5/batch    — protected by API key auth
#   /v5/account  — protected by API key auth
#   /webhooks/paddle — Paddle retries on non-200; rate limiting would break retry logic

# ─── Cron Triggers ────────────────────────────────────────────────────────────
# * * * * *   — real-time halt monitor (every minute)
# 0 9 * * *   — npm downloads + EU DST date-check reminders (March 28, October 25)
# 0 17 * * *  — MCP client daily summary (high-engagement detection)
# 0 9 * * 1   — weekly digest (Monday 09:00 UTC, MCP client analytics)
# Free plan limit: 5 cron triggers. DST reminders consolidated into 0 9 * * *.
# View logs: Cloudflare Dashboard → Workers → headless-oracle-v5 → Logs
[triggers]
crons = ["* * * * *", "0 9 * * *", "0 17 * * *", "0 9 * * 1"]

# ─── Durable Objects ──────────────────────────────────────────────────────────
# StreamCoordinator: one instance per MIC — coordinates SSE streams for /v5/stream.
# Each client request is routed to the DO instance for that MIC.
[[durable_objects.bindings]]
name = "STREAM_COORDINATOR"
class_name = "StreamCoordinator"

[[durable_objects.bindings]]
name = "WEBHOOK_DISPATCHER"
class_name = "WebhookDispatcher"

# Migration required to create the DO class on first deploy.
[[migrations]]
tag = "v1"
new_classes = ["StreamCoordinator"]

[[migrations]]
tag = "v2"
new_classes = ["WebhookDispatcher"]

[observability]
enabled = true
head_sampling_rate = 1